<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Irish Bar — لوحة التحكم</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥃</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .sidebar-logo span, .loader-logo,
    .topbar-title { letter-spacing: 2px; }
    .item-price, .order-total, .stat-value {
      font-family: 'Barlow', 'Cairo', sans-serif !important;
      font-weight: 700 !important;
    }
    /* Toggle Switch */
    .toggle-switch {
      width: 48px; height: 26px;
      background: #ddd;
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px; right: 3px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .toggle-switch.on {
      background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    }
    .toggle-switch.on::after {
      transform: translateX(-22px);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Page Loader -->
<div id="page-loader">
  <div class="loader-logo" style="font-family:var(--font-en);letter-spacing:6px;">IRISH BAR</div>
  <div class="loader-sub" style="font-family:var(--font-en-body);font-weight:600;letter-spacing:3px;text-transform:uppercase;">PREMIUM IRISH SELECTION</div>
  <div class="spinner"></div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<div class="dashboard-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-martini-glass" style="font-size:1rem;color:var(--gold-light);"></i></div>
        <span style="font-family:var(--font-en);letter-spacing:3px;font-size:1.1rem;">IRISH BAR</span>
      </div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebarUserName">...</div>
        <div class="sidebar-user-role" id="sidebarUserRole"></div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Rendered by role -->
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-block btn-sm" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i>
        تسجيل الخروج
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ── Main Content ── -->
  <main style="flex:1; min-width:0;">

    <!-- Top Bar (mobile) -->
    <div class="dashboard-topbar">
      <button class="icon-btn" id="sidebarToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title" id="topbarTitle">لوحة التحكم</div>
      <a href="../index.html" class="icon-btn" title="المتجر">
        <i class="fas fa-store"></i>
      </a>
    </div>

    <!-- Dashboard Content Area -->
    <div class="dashboard-content container" id="dashboardContent">
      <div style="text-align:center;padding:60px 20px;">
        <div class="spinner"></div>
      </div>
    </div>

  </main>
</div>

<!-- ── Bottom Nav (mobile) ── -->
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- ── Modals ── -->

<!-- Add Product Modal -->
<div class="modal-overlay" id="addProductModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title"><i class="fas fa-plus-circle" style="color:var(--gold)"></i> إضافة منتج</div>
    <form id="addProductForm" novalidate>
      <div class="form-group">
        <label class="form-label">اسم المنتج</label>
        <input type="text" class="form-input" id="apName" placeholder="مثال: جيمسون" required>
      </div>
      <div class="form-group">
        <label class="form-label">الفئة</label>
        <select class="form-select" id="apCategory" required>
          <option value="">اختر الفئة</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">السعر (د.ع)</label>
        <input type="number" class="form-input" id="apPrice" placeholder="مثال: 55000" min="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">الوصف</label>
        <textarea class="form-textarea" id="apDesc" rows="2" placeholder="وصف مختصر للمنتج"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">إيموجي المنتج (اختياري)</label>
        <input type="text" class="form-input" id="apEmoji" placeholder="مثال: 🥃 🍺 🍷" value="🥃">
      </div>
      <div class="form-group">
        <label class="form-label">صورة المنتج (اختياري)</label>
        <div id="imgUploadArea" style="border:2px dashed var(--border);border-radius:var(--radius-md);padding:20px;text-align:center;cursor:pointer;transition:var(--transition);background:var(--bg-elevated);" onclick="document.getElementById('apImageFile').click()">
          <div id="imgPreview" style="display:none;margin-bottom:10px;">
            <img id="imgPreviewEl" src="" style="max-height:120px;border-radius:8px;max-width:100%;">
          </div>
          <div id="imgPlaceholder">
            <i class="fas fa-cloud-upload-alt" style="font-size:1.8rem;color:var(--gold);display:block;margin-bottom:8px;"></i>
            <span style="color:var(--text-muted);font-size:0.85rem;">اضغط لاختيار صورة</span>
          </div>
          <div id="imgUploading" style="display:none;color:var(--gold);font-size:0.85rem;">
            <i class="fas fa-spinner fa-spin"></i> جاري الرفع على ImgBB...
          </div>
        </div>
        <input type="file" id="apImageFile" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
        <input type="hidden" id="apImageUrl">
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:12px;">
        <input type="checkbox" id="apAvailable" checked style="width:auto">
        <label for="apAvailable" class="form-label" style="margin:0">متاح للبيع</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="addProductBtn">
        <i class="fas fa-plus"></i> إضافة المنتج
      </button>
      <button type="button" class="btn btn-ghost btn-block" style="margin-top:8px;"
              onclick="closeModal('addProductModal')">إلغاء</button>
    </form>
  </div>
</div>

      <div class="form-group">

<div class="modal-overlay" id="userModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="userModalTitle"><i class="fas fa-user-plus"></i> إضافة مستخدم</div>
    <input type="hidden" id="umId">
    <form id="userForm" novalidate>

<script type="module">
  import { auth, db } from '../js/firebase-config.js';
  import { onAuthChange, logout } from '../js/auth.js';
  import { fetchCategories, fetchProducts, addProduct, updateProduct, deleteProduct, addCategory, fetchDeliverySettings, saveDeliverySettings } from '../js/store.js';
  import { fetchAllOrders, fetchMyOrders, updateOrderStatus, listenToOrders, ORDER_STATUSES, getStatusBadgeClass, formatPrice } from '../js/orders.js';
  import { showToast, openModal, closeModal, hideLoader, formatDate } from '../js/ui.js';

  window.openModal = openModal;
  window.closeModal = closeModal;

  // ── ImgBB Upload ──
  const IMGBB_KEY = '9bab59197bd489ad54ef8917dff4ce81';

  window.handleImageUpload = async function(input) {
    const file = input.files[0];
    if (!file) return;
    // Show preview locally first
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('imgPreviewEl').src = e.target.result;
      document.getElementById('imgPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
    // Upload to ImgBB
    document.getElementById('imgPlaceholder').style.display = 'none';
    document.getElementById('imgUploading').style.display = 'block';
    try {
      const formData = new FormData();
      formData.append('image', file);
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: 'POST', body: formData
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('apImageUrl').value = data.data.url;
        document.getElementById('imgUploading').style.display = 'none';
        document.getElementById('imgUploadArea').style.borderColor = 'var(--green-light)';
        showToast('تم رفع الصورة ✅', 'success');
      } else {
        throw new Error('فشل الرفع');
      }
    } catch (err) {
      document.getElementById('imgUploading').style.display = 'none';
      document.getElementById('imgPlaceholder').style.display = 'block';
      document.getElementById('apImageUrl').value = '';
      showToast('فشل رفع الصورة، حاول مجدداً', 'error');
    }
  };

  let currentProfile = null;
  let categories     = [];
  let products       = [];
  let orders         = [];
  let currentPage    = '';

  // ── Auth Guard ──
  onAuthChange(async (user, profile) => {
    if (!user || !profile) {
      window.location.href = 'auth.html';
      return;
    }
    currentProfile = profile;
    setupUI(profile);
    hideLoader();
    navigateTo(getDefaultPage(profile.role));
  });

  function getDefaultPage(role) {
    if (role === 'admin' || role === 'manager') return 'orders';
    return 'my-orders';
  }

  // ── Setup UI by Role ──
  function setupUI(profile) {
    document.getElementById('sidebarUserName').textContent = profile.name;
    document.getElementById('sidebarUserRole').textContent = getRoleLabel(profile.role);

    const navItems = getNavItems(profile.role);
    const navHtml  = navItems.map(item => `
      <a class="nav-item" data-page="${item.page}" onclick="navigateTo('${item.page}')">
        <i class="fas ${item.icon}"></i>
        <span>${item.label}</span>
      </a>
    `).join('');
    document.getElementById('sidebarNav').innerHTML = navHtml;

    // Bottom Nav
    const bottomHtml = navItems.slice(0, 5).map(item => `
      <button class="bottom-nav-item" data-page="${item.page}" onclick="navigateTo('${item.page}')">
        <i class="fas ${item.icon}"></i>
        <span>${item.label}</span>
      </button>
    `).join('');
    document.getElementById('bottomNav').innerHTML = bottomHtml;
  }

  function getNavItems(role) {
    const items = {
      admin: [
        { page: 'orders',        icon: 'fa-receipt',         label: 'الطلبات' },
        { page: 'products',      icon: 'fa-box-open',        label: 'المنتجات' },
        { page: 'categories',    icon: 'fa-tags',            label: 'الفئات' },
        { page: 'users',         icon: 'fa-users',           label: 'المستخدمون' },
        { page: 'delivery',      icon: 'fa-motorcycle',      label: 'التوصيل' },
        { page: 'notifications', icon: 'fa-bell',            label: 'الإشعارات' },
        { page: 'stats',         icon: 'fa-chart-bar',       label: 'الإحصائيات' },
        { page: 'my-orders',     icon: 'fa-shopping-bag',    label: 'طلباتي' },
      ],
      manager: [
        { page: 'orders',     icon: 'fa-receipt',         label: 'الطلبات' },
        { page: 'products',   icon: 'fa-box-open',        label: 'المنتجات' },
        { page: 'categories', icon: 'fa-tags',            label: 'الفئات' },
        { page: 'my-orders',  icon: 'fa-shopping-bag',    label: 'طلباتي' },
      ],
      customer: [
        { page: 'my-orders',  icon: 'fa-shopping-bag',    label: 'طلباتي' },
        { page: 'profile',    icon: 'fa-user-circle',     label: 'حسابي' },
      ]
    };
    return items[role] || items.customer;
  }

  function getRoleLabel(role) {
    const labels = { admin: '👑 مدير عام', manager: '🔧 مدير', customer: '🛒 عميل' };
    return labels[role] || role;
  }

  // ── Navigation ──
  window.navigateTo = function(page) {
    currentPage = page;
    document.getElementById('topbarTitle').textContent = getPageTitle(page);
    document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });
    closeSidebar();
    renderPage(page);
  };

  function getPageTitle(page) {
    const titles = {
      orders: 'إدارة الطلبات', products: 'إدارة المنتجات',
      categories: 'إدارة الفئات', users: 'إدارة المستخدمين',
      stats: 'الإحصائيات', 'my-orders': 'طلباتي', profile: 'حسابي',
      delivery: 'إعدادات التوصيل', notifications: 'إعدادات الإشعارات'
    };
    return titles[page] || 'لوحة التحكم';
  }

  // ── Render Pages ──
  async function renderPage(page) {
    const content = document.getElementById('dashboardContent');
    content.innerHTML = `<div style="text-align:center;padding:60px 20px;"><div class="spinner"></div></div>`;

    try {
      if (page === 'orders')     await renderOrdersPage(content);
      else if (page === 'products')   await renderProductsPage(content);
      else if (page === 'categories') await renderCategoriesPage(content);
      else if (page === 'users')      await renderUsersPage(content);
      else if (page === 'stats')      await renderStatsPage(content);
      else if (page === 'my-orders')  await renderMyOrdersPage(content);
      else if (page === 'profile')    renderProfilePage(content);
      else if (page === 'delivery')       await renderDeliveryPage(content);
      else if (page === 'notifications')  await renderNotificationsPage(content);
    } catch (e) {
      console.error('Page load error:', e);
      content.innerHTML = `
        <div style="text-align:center;padding:40px;color:var(--text-muted);">
          <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--gold);display:block;margin-bottom:12px;"></i>
          <p style="margin-bottom:16px;">حدث خطأ أثناء التحميل</p>
          <button class="btn btn-primary" onclick="navigateTo('${page}')">
            <i class="fas fa-redo"></i> إعادة المحاولة
          </button>
        </div>`;
    }
  }

  // ─────────────────────────────────────
  // ORDERS PAGE
  // ─────────────────────────────────────
  async function renderOrdersPage(content) {
    orders = await fetchAllOrders();
    content.innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <div class="section-card-title"><i class="fas fa-receipt"></i> جميع الطلبات</div>
          <span class="badge badge-gold">${orders.length} طلب</span>
        </div>
        <div class="section-card-body" id="ordersList">
          ${orders.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد طلبات</div>' : ''}
          ${orders.map(o => renderOrderCard(o)).join('')}
        </div>
      </div>
    `;
  }

  function renderOrderCard(o) {
    const badge = getStatusBadgeClass(o.status);
    const itemsText = o.items?.map(i => `${i.emoji || ''} ${i.name} ×${i.quantity}`).join('، ') || '';
    return `
      <div class="order-card">
        <div class="order-card-header">
          <div>
            <div class="order-id">#${o.id.slice(-6).toUpperCase()}</div>
            <div class="order-date">${formatDate(o.createdAt)}</div>
          </div>
          <span class="badge ${badge}">${o.status}</span>

  // ─────────────────────────────────────

  // ─────────────────────────────────────
  async function renderProductsPage(content) {
    [categories, products] = await Promise.all([fetchCategories(), fetchProducts()]);
    const catOptions = categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    document.getElementById('apCategory').innerHTML = '<option value="">اختر الفئة</option>' + catOptions;

    function buildProductsHTML(prods) {
      const byCategory = {};
      categories.forEach(c => { byCategory[c.id] = []; });
      prods.forEach(p => {
        if (byCategory[p.categoryId] !== undefined) byCategory[p.categoryId].push(p);
        else { if (!byCategory['other']) byCategory['other'] = []; byCategory['other'].push(p); }
      });

      const catList = [...categories];
      if (byCategory['other'] && byCategory['other'].length)
        catList.push({ id: 'other', name: 'أخرى', icon: '📦' });

      return catList.map(cat => {
        const catProducts = byCategory[cat.id] || [];
        if (!catProducts.length) return '';
        return `
          <div class="section-card" style="margin-bottom:20px;">
            <div class="section-card-header">
              <div class="section-card-title">${cat.icon} ${cat.name}</div>
              <span class="badge badge-gold">${catProducts.length}</span>
            </div>
            <div class="admin-products-grid">
              ${catProducts.map(p => `
                <div class="admin-product-card">
                  <div class="apc-img" onclick="openEditProduct('${p.id}')">
                    ${p.imageUrl
                      ? `<img src="${p.imageUrl}" alt="${p.name}">`
                      : `<span class="apc-emoji">${p.emoji || '🍺'}</span>`
                    }
                    <span class="apc-status ${p.available !== false ? 'apc-avail' : 'apc-unavail'}">
                      ${p.available !== false ? 'متاح' : 'غير متاح'}
                    </span>
                  </div>
                  <div class="apc-body">
                    <div class="apc-name">${p.name}</div>
                    <div class="apc-price">${formatPrice(p.price)}</div>
                  </div>
                  <div class="apc-actions">
                    <button class="apc-btn apc-toggle" title="تغيير الحالة" onclick="toggleAvailability('${p.id}', ${p.available !== false})">
                      ${p.available !== false ? '🟢' : '🔴'}
                    </button>
                    <button class="apc-btn apc-edit" title="تعديل" onclick="openEditProduct('${p.id}')">
                      <i class="fas fa-pen"></i>
                    </button>
                    <button class="apc-btn apc-del" title="حذف" onclick="handleDeleteProduct('${p.id}', '${p.name}')">
                      <i class="fas fa-trash"></i>
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    content.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 style="font-family:var(--font-display);color:var(--gold-light);">المنتجات</h2>
        <button class="btn btn-primary btn-sm" onclick="openModal('addProductModal')">
          <i class="fas fa-plus"></i> منتج جديد
        </button>
      </div>
      <div style="position:relative;margin-bottom:20px;">
        <i class="fas fa-search" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;"></i>
        <input type="text" id="adminProductSearch" placeholder="ابحث عن منتج..." 
          style="width:100%;padding:10px 40px 10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);font-family:var(--font-body);font-size:0.9rem;color:var(--text-primary);direction:rtl;"
          oninput="filterAdminProducts(this.value)">
      </div>
      <div id="adminProductsContainer">
        ${buildProductsHTML(products)}
        ${products.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد منتجات بعد</div>' : ''}
      </div>
    `;

    window._allProducts = products;
    window.filterAdminProducts = function(q) {
      const term = q.trim().toLowerCase();
      const filtered = term ? window._allProducts.filter(p =>
        p.name.toLowerCase().includes(term) ||
        (p.description || '').toLowerCase().includes(term)
      ) : window._allProducts;
      document.getElementById('adminProductsContainer').innerHTML =
        buildProductsHTML(filtered) ||
        '<div style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد نتائج</div>';
    };
  }

    e.preventDefault();
    const btn = document.getElementById('userSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
    const id   = document.getElementById('umId').value;
    const name = document.getElementById('umName').value;
    const role = document.getElementById('umRole').value;
    try {
      const { setDoc, updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
      if (id) {
        // Edit existing — update Firestore only
        await updateDoc(doc(db, 'users', id), { name, role });
        showToast('✅ تم تحديث المستخدم', 'success');
      } else {
        // Add new — create via Admin API is needed for Auth
        // We just create Firestore record; email/pass handled separately
        const email = document.getElementById('umEmail').value;
        // Create a placeholder doc with generated ID
        const newId = 'manual_' + Date.now();
        await setDoc(doc(db, 'users', newId), { name, email, role });
        showToast('✅ تم إضافة المستخدم في قاعدة البيانات', 'success');

      closeModal('userModal');
      await renderPage('users');

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> حفظ';

              <i class="fas fa-calculator"></i> حاسبة تجريبية
            </div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">

  window.previewCalc = function() {
    const km         = parseFloat(document.getElementById('previewKm')?.value) || 0;
    const pricePerKm = parseFloat(document.getElementById('dPricePerKm')?.value) || 1000;
    const minFee     = parseFloat(document.getElementById('dMinFee')?.value) || 1000;
    const fee        = Math.max(Math.ceil(km) * pricePerKm, minFee);
    const el = document.getElementById('previewResult');
    if (el) el.textContent = formatPrice(fee);
  };

  window.saveDeliveryPage = async function() {
    const centerLat  = parseFloat(document.getElementById('dCenterLat').value);
    const centerLng  = parseFloat(document.getElementById('dCenterLng').value);
    const pricePerKm = parseFloat(document.getElementById('dPricePerKm').value);
    const minFee     = parseFloat(document.getElementById('dMinFee').value);
    if (isNaN(centerLat) || isNaN(centerLng) || isNaN(pricePerKm)) {
      showToast('الرجاء تعبئة جميع الحقول', 'warning'); return;
    }
    try {
      await saveDeliverySettings({ centerLat, centerLng, pricePerKm, minFee: minFee || pricePerKm });
      showToast('✅ تم حفظ إعدادات التوصيل', 'success');
    } catch { showToast('حدث خطأ', 'error'); }
  };

  window.openEditProduct = async function(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('epId').value         = id;
    document.getElementById('epName').value       = p.name || '';
    document.getElementById('epPrice').value      = p.price || '';
    document.getElementById('epDesc').value       = p.description || '';
    document.getElementById('epEmoji').value      = p.emoji || '🍺';
    document.getElementById('epImageUrl').value = p.imageUrl || '';
    document.getElementById('epAvailable').checked = p.available !== false;
    // Fill categories
    const cats = await fetchCategories();
    document.getElementById('epCategory').innerHTML =
      cats.map(c => `<option value="${c.id}" ${c.id===p.categoryId?'selected':''}>${c.icon} ${c.name}</option>`).join('');
    openModal('editProductModal');
  };

        name:        document.getElementById('epName').value,
        categoryId:  document.getElementById('epCategory').value,

  // ── Toggle switch handler ──
  window.toggleTgEnabled = function() {
    const el = document.getElementById('tgToggle');
    el.classList.toggle('on');
    const isOn = el.classList.contains('on');
    const banner = document.getElementById('tgStatusBanner');
    banner.style.background = isOn ? '#f0faf5' : '#fdf8f0';
    banner.style.borderColor = isOn ? 'rgba(45,106,79,0.25)' : 'rgba(184,146,42,0.25)';
  };

  window.toggleTokenVisibility = function() {
    const inp = document.getElementById('tgBotToken');
    const ico = document.getElementById('tokenEyeBtn').querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; ico.className = 'fas fa-eye'; }
  };

  window.saveTelegramSettings = async function() {
    const botToken = document.getElementById('tgBotToken').value.trim();
    const chatId   = document.getElementById('tgChatId').value.trim();
    const enabled  = document.getElementById('tgToggle').classList.contains('on');
    if (!botToken || !chatId) { showToast('الرجاء إدخال Token و Chat ID', 'warning'); return; }
    try {
      const { setDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
      await setDoc(doc(db, 'settings', 'telegram'), { botToken, chatId, enabled });
      showToast('✅ تم حفظ إعدادات تيليغرام', 'success');
    } catch { showToast('حدث خطأ أثناء الحفظ', 'error'); }
  };

  window.saveTriggers = async function() {
    const triggers = {};
    document.querySelectorAll('.toggle-switch[data-key]').forEach(el => {
      triggers[el.dataset.key] = el.classList.contains('on');
    });
    try {
      const { setDoc, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
      const snap = await getDoc(doc(db, 'settings', 'telegram'));
      const existing = snap.exists() ? snap.data() : {};
      await setDoc(doc(db, 'settings', 'telegram'), { ...existing, ...triggers });
      showToast('✅ تم حفظ التفضيلات', 'success');
    } catch { showToast('حدث خطأ', 'error'); }
  };

  window.sendTestMessage = async function() {
    const botToken = document.getElementById('tgBotToken').value.trim();
    const chatId   = document.getElementById('tgChatId').value.trim();
    if (!botToken || !chatId) { showToast('أدخل Token و Chat ID أولاً', 'warning'); return; }
    const btn = document.getElementById('testMsgBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
    try {
      const msg = `🥃 *Irish Bar — رسالة تجريبية*\n━━━━━━━━━━━━━━\n✅ تم الاتصال بنجاح!\nالإشعارات تعمل بشكل صحيح.\n━━━━━━━━━━━━━━\n_تم الإرسال من لوحة التحكم_`;
      const res = await fetch(
        'https://api.telegram.org/bot' + botToken + '/sendMessage',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'Markdown' })
        }
      );
      const data = await res.json();
      if (data.ok) {
        showToast('✅ تم إرسال الرسالة التجريبية بنجاح!', 'success');
      } else {
        showToast('❌ خطأ: ' + (data.description || 'تحقق من البيانات'), 'error');
      }
    } catch (e) {
      showToast('❌ فشل الاتصال بتيليغرام', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fab fa-telegram"></i> رسالة تجريبية';
  };

  // ── Logout ──
  window.handleLogout = async function() {
    await logout();
    window.location.href = 'auth.html';

  // ── Sidebar Controls ──
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  };
  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  };

</script>
