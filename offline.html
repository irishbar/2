<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Irish Bar — لا يوجد اتصال</title>
  <script>
    (function(){
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e){ var now = Date.now(); if (now - lastTouchEnd < 300) { e.preventDefault(); } lastTouchEnd = now; }, { passive: false });
      document.addEventListener('touchstart', function(e){ if (e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
      document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, { passive: false });
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f8f7f4;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 1.3rem; font-weight: 900;
      letter-spacing: 3px; color: #8a6b1a;
      margin-bottom: 8px;
    }
    .logo-sub { font-size: 0.7rem; color: #9a8e7e; letter-spacing: 2px; margin-bottom: 40px; }
    .icon-wrap {
      width: 110px; height: 110px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid rgba(184,146,42,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 32px rgba(184,146,42,0.1);
    }
    .icon-wrap svg { width: 52px; height: 52px; color: #b8922a; fill: none; stroke: #b8922a; stroke-width: 1.5; }
    h1 { font-size: 1.35rem; font-weight: 900; color: #1a1612; margin-bottom: 10px; }
    p  { font-size: 0.88rem; color: #4a4035; line-height: 1.7; margin-bottom: 32px; max-width: 280px; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #d4aa45, #b8922a);
      color: #fff; border: none;
      padding: 14px 32px; border-radius: 9999px;
      font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 20px rgba(184,146,42,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .retry-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(184,146,42,0.2); }
    .tip {
      margin-top: 32px;
      background: #fff;
      border: 1px solid rgba(184,146,42,0.18);
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 0.78rem; color: #9a8e7e;
      max-width: 300px; line-height: 1.7;
    }
    .tip strong { color: #8a6b1a; }
  </style>
</head>
<body>
  <div class="logo">IRISH BAR</div>
  <div class="logo-sub">PREMIUM IRISH SELECTION</div>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى</p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    إعادة المحاولة
  </button>

  <div class="tip">
    <strong>تلميح:</strong> بعض الصفحات متاحة بدون إنترنت إذا سبق وزرتها. جرّب الرجوع للصفحة الرئيسية.
    <br><br>
    <button onclick="window.location.href='/index.html'" style="background:none;border:none;color:#b8922a;font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;text-decoration:underline;">الصفحة الرئيسية</button>
  </div>
</body>
</html>
